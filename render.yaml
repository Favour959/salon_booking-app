services:
  - type: web
    name: salon-booking
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn salon_project.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
